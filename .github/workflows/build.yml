name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Create gitignored config files for CI
        run: |
          cp lib/config/secrets_template.dart lib/config/secrets.dart
          cp lib/config/payment_config_template.dart lib/config/payment_config.dart
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos

  build:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Create gitignored config files for CI
        run: |
          cp lib/config/secrets_template.dart lib/config/secrets.dart
          cp lib/config/payment_config_template.dart lib/config/payment_config.dart
      - run: flutter pub get
      - run: flutter build apk --debug --android-skip-build-dependency-validation
      - uses: actions/upload-artifact@v4
        with:
          name: timbo-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
