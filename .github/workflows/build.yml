name: CI Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g -XX:+UseParallelGC"
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - run: flutter pub get
      - name: Set up Google Fonts for tests
        run: |
          mkdir -p fonts
          cp test/fonts/* fonts/ 2>/dev/null || true
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      - run: flutter build apk --debug --android-skip-build-dependency-validation
      - uses: actions/upload-artifact@v4
        with:
          name: timbo-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
