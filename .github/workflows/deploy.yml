name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - run: flutter pub get
      - name: Set up test fonts
        run: |
          mkdir -p fonts
          cp test/fonts/* fonts/ 2>/dev/null || true
      - run: flutter analyze --no-fatal-infos

  test:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Set up test fonts
        run: |
          mkdir -p fonts
          cp test/fonts/* fonts/ 2>/dev/null || true
      - run: flutter pub get
      - run: flutter test

  build-debug:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --debug --android-skip-build-dependency-validation
      - uses: actions/upload-artifact@v4
        with:
          name: timbo-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - run: flutter pub get
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          fi
      - name: Create key.properties
        run: |
          if [ -n "${{ secrets.STORE_PASSWORD }}" ]; then
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "storeFile=keystore.jks" >> android/key.properties
          fi
      - name: Build release APK
        run: |
          if [ -f android/key.properties ]; then
            flutter build apk --release --android-skip-build-dependency-validation
          else
            echo "No signing secrets configured — building unsigned release APK"
            flutter build apk --release --android-skip-build-dependency-validation
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: timbo-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
