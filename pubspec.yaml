name: timbo_app
description: "An offline-first, AI-assisted personal memory and organization app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.2
  path: ^1.9.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  firebase_crashlytics: ^5.2.3
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  uuid: ^4.3.3
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  record: ^7.0.0
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  http: ^1.2.0
  json_annotation: ^4.9.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  just_audio: ^0.9.40
  speech_to_text: ^7.0.0
  home_widget: ^0.7.0
  sensors_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.25.1
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
