name: timbo_app
description: "A comprehensive productivity app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_analytics: ^10.8.0
  google_generative_ai: ^0.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  video_player: ^2.8.3
  flutter_local_notifications: ^17.1.2
  vibration: ^1.8.4
  shared_preferences: ^2.2.3
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  path: ^1.9.0
  audioplayers: ^6.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  sensors_plus: ^4.0.2
  home_widget: ^0.9.0
  flutter_slidable: ^3.1.0
  table_calendar: ^3.1.1
  speech_to_text: ^6.6.2
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  share_plus: ^9.0.0
  timezone: ^0.9.2
  record: 4.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1F2937"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
