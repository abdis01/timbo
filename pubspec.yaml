name: timbo_app
description: "A comprehensive productivity app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_analytics: ^12.4.2
  firebase_crashlytics: ^5.2.3
  google_generative_ai: ^0.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  intl: ^0.20.2
  uuid: ^4.3.3
  permission_handler: ^12.0.3
  image_picker: ^1.0.7
  video_player: ^2.8.3
  flutter_local_notifications: ^22.0.0
  vibration: ^3.1.8
  shared_preferences: ^2.2.3
  camera: ^0.12.0+1
  path_provider: ^2.1.2
  path: ^1.9.0
  audioplayers: ^6.0.0
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  sensors_plus: ^7.0.0
  home_widget: ^0.9.0
  flutter_slidable: ^4.0.3
  table_calendar: ^3.1.1
  speech_to_text: ^7.4.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^7.1.1
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  firebase_remote_config: ^6.5.2
  share_plus: ^13.1.0
  timezone: ^0.11.0
  record: ^7.0.0
  rive: ^0.14.8
  http: ^1.2.0
  animated_background: ^2.0.0
  smooth_page_indicator: ^2.0.1
  palette_generator: ^0.3.3+7

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi/Satoshi-Light.otf
          weight: 300
        - asset: assets/fonts/Satoshi/Satoshi-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/Satoshi/Satoshi-Regular.otf
          weight: 400
        - asset: assets/fonts/Satoshi/Satoshi-Italic.otf
          weight: 400
          style: italic
        - asset: assets/fonts/Satoshi/Satoshi-Medium.otf
          weight: 500
        - asset: assets/fonts/Satoshi/Satoshi-MediumItalic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/Satoshi/Satoshi-Bold.otf
          weight: 700
        - asset: assets/fonts/Satoshi/Satoshi-BoldItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/Satoshi/Satoshi-Black.otf
          weight: 900
        - asset: assets/fonts/Satoshi/Satoshi-BlackItalic.otf
          weight: 900
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1F2937"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
